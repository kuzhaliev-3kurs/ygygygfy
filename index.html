<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Status</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #e8eaf0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 440px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .card h2 {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        #myInfo {
            font-size: 14px;
            color: #444;
            margin-bottom: 16px;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .status-btn {
            padding: 13px 10px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: opacity 0.15s;
        }

        .status-btn:hover {
            opacity: 0.88;
        }

        .btn-study   { background: #3dba4e; }
        .btn-coffee  { background: #f5a800; }
        .btn-game    { background: #00b0c8; }
        .btn-home    { background: #7a7e88; }

        .card h2.monitor-title {
            margin-bottom: 16px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .user-info strong {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .user-info small {
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Мой профиль</h2>
        <div id="myInfo">Загрузка...</div>
        <div class="buttons-grid">
            <button class="status-btn btn-study"  onclick="changeStatus('Учусь', '#3dba4e')">📚 Учусь</button>
            <button class="status-btn btn-coffee" onclick="changeStatus('Кофе-брейк', '#f5a800')">☕ Кофе</button>
            <button class="status-btn btn-game"   onclick="changeStatus('В игре', '#00b0c8')">🎮 В игре</button>
            <button class="status-btn btn-home"   onclick="changeStatus('Дома', '#7a7e88')">🏠 Дома</button>
        </div>
    </div>

    <div class="card">
        <h2 class="monitor-title">Монитор группы</h2>
        <div id="groupList">Загрузка...</div>
    </div>
<button onclick="loginWithGoogle()" id="google-btn">
  🔑 Войти через Google
</button>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://serysrvsaofnupgamgad.supabase.co';
        const KEY = 'sb_publishable_Bn6zfU-wPY4_p-nqrGaocw_RuY34wT9';
        const supabase = createClient(URL, KEY);

        const MY_ID = '79d63816-53e5-4fb2-9fca-a0b6acbff622';

        window.changeStatus = async (text, color) => {
            const { error } = await supabase
                .from('profiles')
                .update({ status: text, color: color })
                .eq('id', MY_ID);

            if (error) {
                alert("Ошибка! Проверьте RLS политики в Supabase.");
                console.error(error);
            } else {
                fetchGroup();
            }
        };

        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) return console.error(error);

            const list = document.getElementById('groupList');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div class="user-info">
                        <strong>${user.username}</strong>
                        <small>${user.status || 'Статус не задан'}</small>
                    </div>
                </div>
            `).join('');

            const me = data.find(u => u.id === MY_ID);
            if (me) document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
        }

        fetchGroup();
        setInterval(fetchGroup, 5000);
        async function loginWithGoogle() {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + window.location.pathname
    }
  });
  if (error) console.error('Ошибка входа:', error.message);
}
        // При загрузке страницы проверяй сессию
const { data: { session } } = await supabase.auth.getSession();
if (session) {
  // пользователь вошёл, покажи профиль
  console.log('Пользователь:', session.user.email);
}

// Слушай изменения авторизации
supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN') {
    // обнови UI
  }
});
    </script>
</body>
</html>
