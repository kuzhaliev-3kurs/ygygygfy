<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Status</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #e8eaf0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 440px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .card h2 {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        #myInfo {
            font-size: 14px;
            color: #444;
            margin-bottom: 16px;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .status-btn {
            padding: 13px 10px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: opacity 0.15s;
        }

        .status-btn:hover { opacity: 0.88; }

        .btn-study  { background: #3dba4e; }
        .btn-coffee { background: #f5a800; }
        .btn-game   { background: #00b0c8; }
        .btn-home   { background: #7a7e88; }

        .card h2.monitor-title { margin-bottom: 16px; }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .user-info strong {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .user-info small {
            font-size: 13px;
            color: #666;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            border: 1.5px solid #dadce0;
            border-radius: 10px;
            background: #fff;
            color: #3c4043;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.15s;
            margin-top: 4px;
        }

        .google-btn:hover {
            background: #f8f9fa;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }

        .logout-link {
            display: block;
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            color: #999;
            cursor: pointer;
            background: none;
            border: none;
            width: 100%;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Карточка входа -->
    <div class="card" id="loginCard" style="display:none">
        <h2>Войти в Group Status</h2>
        <p style="font-size:14px;color:#666;margin-bottom:16px;">Войдите чтобы установить свой статус</p>
        <button class="google-btn" id="googleBtn">
            <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Войти через Google
        </button>
    </div>

    <!-- Карточка профиля -->
    <div class="card" id="profileCard" style="display:none">
        <h2>Мой профиль</h2>
        <div id="myInfo">Загрузка...</div>
        <div class="buttons-grid">
            <button class="status-btn btn-study"  onclick="changeStatus('Учусь', '#3dba4e')">📚 Учусь</button>
            <button class="status-btn btn-coffee" onclick="changeStatus('Кофе-брейк', '#f5a800')">☕ Кофе</button>
            <button class="status-btn btn-game"   onclick="changeStatus('В игре', '#00b0c8')">🎮 В игре</button>
            <button class="status-btn btn-home"   onclick="changeStatus('Дома', '#7a7e88')">🏠 Дома</button>
        </div>
        <button class="logout-link" id="logoutBtn">Выйти из аккаунта</button>
    </div>

    <!-- Монитор группы — виден всегда -->
    <div class="card">
        <h2 class="monitor-title">Монитор группы</h2>
        <div id="groupList">Загрузка...</div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://serysrvsaofnupgamgad.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Bn6zfU-wPY4_p-nqrGaocw_RuY34wT9';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUserId = null;

        // Кнопка Google
        document.getElementById('googleBtn').addEventListener('click', async () => {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href }
            });
            if (error) console.error('Ошибка входа:', error.message);
        });

        // Выход
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
        });

        // Смена статуса
        window.changeStatus = async (text, color) => {
            if (!currentUserId) return;
            const { error } = await supabase
                .from('profiles')
                .update({ status: text, color: color })
                .eq('id', currentUserId);
            if (error) { alert("Ошибка! Проверьте RLS политики."); console.error(error); }
            else fetchGroup();
        };

        // Загрузка группы
        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });
            if (error) return console.error(error);

            document.getElementById('groupList').innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background:${user.color || '#ccc'}"></div>
                    <div class="user-info">
                        <strong>${user.username}</strong>
                        <small>${user.status || 'Статус не задан'}</small>
                    </div>
                </div>
            `).join('');

            if (currentUserId) {
                const me = data.find(u => u.id === currentUserId);
                if (me) document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
            }
        }

        // Обновление UI
        function updateUI(session) {
            if (session) {
                currentUserId = session.user.id;
                document.getElementById('loginCard').style.display   = 'none';
                document.getElementById('profileCard').style.display = 'block';
            } else {
                currentUserId = null;
                document.getElementById('loginCard').style.display   = 'block';
                document.getElementById('profileCard').style.display = 'none';
            }
            fetchGroup();
        }

        // Проверка сессии при загрузке
        const { data: { session } } = await supabase.auth.getSession();
        updateUI(session);

        // Слушаем изменения (срабатывает после редиректа от Google)
        supabase.auth.onAuthStateChange((_event, session) => {
            updateUI(session);
        });

        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
